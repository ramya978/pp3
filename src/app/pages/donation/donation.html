    <!-- ── PEOPLES PLANET DONATION FORM ── -->
                <div
                    class="elementor-element elementor-element-d81c0ee elementor-widget elementor-widget-shortcode"
                    data-id="d81c0ee"
                    data-element_type="widget"
                    data-widget_type="shortcode.default"
                >
                    <div class="elementor-widget-container">
                        <div class="elementor-shortcode"  style="    margin-top: 59px;
    margin-bottom: 49px;">

                            <!-- Donation Form Box -->
                            <div style="
                                background: #ffffff;
                                border-radius: 16px;
                                padding: 40px 36px;
                               max-width: 800px;
                                margin: 0 auto;
                                font-family: inherit;
                            ">
                                <h2 style="margin:0 0 6px 0;font-size:1.5em;color:#1a3a1a;">Make a Donation</h2>
                                <p style="margin:0 0 24px 0;color:#555;font-size:0.95em;">Your contribution helps us plant trees, reduce carbon emissions, and empower communities.</p>

                                <!-- Amount Selector -->
                                <p style="font-weight:600;margin-bottom:10px;color:#222;">Select Amount (INR)</p>
                                <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;" id="pp-amount-grid">
                                    <button onclick="ppSetAmount(500)"  class="pp-amt-btn" style="flex:1 1 calc(33% - 10px);padding:12px 0;border:2px solid #2e7d32;border-radius:8px;background:#fff;color:#2e7d32;font-weight:700;font-size:1em;cursor:pointer;">₹500</button>
                                    <button onclick="ppSetAmount(1000)" class="pp-amt-btn" style="flex:1 1 calc(33% - 10px);padding:12px 0;border:2px solid #2e7d32;border-radius:8px;background:#fff;color:#2e7d32;font-weight:700;font-size:1em;cursor:pointer;">₹1,000</button>
                                    <button onclick="ppSetAmount(2500)" class="pp-amt-btn" style="flex:1 1 calc(33% - 10px);padding:12px 0;border:2px solid #2e7d32;border-radius:8px;background:#fff;color:#2e7d32;font-weight:700;font-size:1em;cursor:pointer;">₹2,500</button>
                                    <button onclick="ppSetAmount(5000)" class="pp-amt-btn" style="flex:1 1 calc(33% - 10px);padding:12px 0;border:2px solid #2e7d32;border-radius:8px;background:#fff;color:#2e7d32;font-weight:700;font-size:1em;cursor:pointer;">₹5,000</button>
                                    <button onclick="ppSetAmount(10000)" class="pp-amt-btn" style="flex:1 1 calc(33% - 10px);padding:12px 0;border:2px solid #2e7d32;border-radius:8px;background:#fff;color:#2e7d32;font-weight:700;font-size:1em;cursor:pointer;">₹10,000</button>
                                    <button onclick="ppSetAmount('custom')" class="pp-amt-btn" style="flex:1 1 calc(33% - 10px);padding:12px 0;border:2px solid #2e7d32;border-radius:8px;background:#fff;color:#2e7d32;font-weight:700;font-size:1em;cursor:pointer;">Other</button>
                                </div>

                                <!-- Custom Amount -->
                                <div id="pp-custom-box" style="display:none;margin-bottom:16px;">
                                    <label style="font-weight:600;color:#222;display:block;margin-bottom:6px;">Enter Amount (₹)</label>
                                    <input id="pp-custom-input" type="number" min="1" placeholder="Enter amount"
                                        style="width:100%;padding:12px 14px;border:2px solid #ccc;border-radius:8px;font-size:1em;box-sizing:border-box;"
                                        oninput="ppCustomAmount(this.value)"
                                    >
                                </div>

                                <!-- Name -->
                                <div style="margin-bottom:14px;">
                                    <label style="font-weight:600;color:#222;display:block;margin-bottom:6px;">Full Name *</label>
                                    <input id="pp-name" type="text" placeholder="Your full name"
                                        style="width:100%;padding:12px 14px;border:2px solid #ccc;border-radius:8px;font-size:1em;box-sizing:border-box;">
                                </div>

                                <!-- Email -->
                                <div style="margin-bottom:14px;">
                                    <label style="font-weight:600;color:#222;display:block;margin-bottom:6px;">Email Address *</label>
                                    <input id="pp-email" type="email" placeholder="your@email.com"
                                        style="width:100%;padding:12px 14px;border:2px solid #ccc;border-radius:8px;font-size:1em;box-sizing:border-box;">
                                </div>

                                <!-- Phone -->
                                <div style="margin-bottom:14px;">
                                    <label style="font-weight:600;color:#222;display:block;margin-bottom:6px;">Phone Number</label>
                                    <input id="pp-phone" type="tel" placeholder="+91 XXXXX XXXXX"
                                        style="width:100%;padding:12px 14px;border:2px solid #ccc;border-radius:8px;font-size:1em;box-sizing:border-box;">
                                </div>

                                <!-- 80G Checkbox -->
                                <div style="margin-bottom:20px;display:flex;align-items:center;gap:10px;">
                                    <input id="pp-80g" type="checkbox" style="width:18px;height:18px;accent-color:#2e7d32;">
                                    <label for="pp-80g" style="color:#444;font-size:0.93em;">I would like an 80G tax exemption certificate</label>
                                </div>

                                <!-- Error Message -->
                                <div id="pp-error" style="display:none;color:#c0392b;margin-bottom:14px;font-size:0.93em;padding:10px;background:#fdecea;border-radius:6px;"></div>

                                <!-- Selected Amount Display -->
                                <div id="pp-selected-display" style="display:none;margin-bottom:16px;padding:12px 16px;background:#e8f5e9;border-radius:8px;color:#2e7d32;font-weight:700;font-size:1.05em;">
                                    Donating: <span id="pp-display-amt"></span>
                                </div>

                                <!-- Donate Button -->
                                <button
                                    onclick="ppPay()"
                                    id="pp-donate-btn"
                                    style="
                                        width:100%;
                                        padding:16px;
                                        background:#2e7d32;
                                        color:#fff;
                                        border:none;
                                        border-radius:8px;
                                        font-size:1.1em;
                                        font-weight:700;
                                        cursor:pointer;
                                        letter-spacing:0.5px;
                                        transition:background 0.2s;
                                    "
                                    onmouseover="this.style.background='#1b5e20'"
                                    onmouseout="this.style.background='#2e7d32'"
                                >
                                    🌱 Donate Now
                                </button>

                                <p style="margin-top:14px;text-align:center;font-size:0.82em;color:#888;">
                                    Secured by Razorpay &nbsp;|&nbsp; 80G Tax Benefit Available &nbsp;|&nbsp; All contributions support Peoples Planet's environmental programs.
                                </p>
                            </div>

                            <!-- Razorpay Script -->
                            <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
                            <script>
                                var ppAmount = 0;

                                function ppSetAmount(val) {
                                    var customBox = document.getElementById('pp-custom-box');
                                    var btns = document.querySelectorAll('.pp-amt-btn');
                                    btns.forEach(function(b){ b.style.background='#fff'; b.style.color='#2e7d32'; });

                                    if (val === 'custom') {
                                        customBox.style.display = 'block';
                                        ppAmount = 0;
                                        document.getElementById('pp-selected-display').style.display = 'none';
                                        event.target.style.background = '#2e7d32';
                                        event.target.style.color = '#fff';
                                    } else {
                                        customBox.style.display = 'none';
                                        ppAmount = val;
                                        document.getElementById('pp-selected-display').style.display = 'block';
                                        document.getElementById('pp-display-amt').innerText = '₹' + val.toLocaleString('en-IN');
                                        event.target.style.background = '#2e7d32';
                                        event.target.style.color = '#fff';
                                    }
                                    document.getElementById('pp-error').style.display = 'none';
                                }

                                function ppCustomAmount(val) {
                                    ppAmount = parseInt(val) || 0;
                                    if (ppAmount > 0) {
                                        document.getElementById('pp-selected-display').style.display = 'block';
                                        document.getElementById('pp-display-amt').innerText = '₹' + ppAmount.toLocaleString('en-IN');
                                    } else {
                                        document.getElementById('pp-selected-display').style.display = 'none';
                                    }
                                }

                                function ppShowError(msg) {
                                    var el = document.getElementById('pp-error');
                                    el.innerText = msg;
                                    el.style.display = 'block';
                                }

                                function ppPay() {
                                    var name  = document.getElementById('pp-name').value.trim();
                                    var email = document.getElementById('pp-email').value.trim();
                                    var phone = document.getElementById('pp-phone').value.trim();
                                    document.getElementById('pp-error').style.display = 'none';

                                    if (!ppAmount || ppAmount < 1) { ppShowError('Please select or enter a donation amount.'); return; }
                                    if (!name)  { ppShowError('Please enter your full name.'); return; }
                                    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { ppShowError('Please enter a valid email address.'); return; }

                                    var options = {
                                        key: 'rzp_live_YOUR_KEY_HERE', // ← Replace with your Razorpay live key
                                        amount: ppAmount * 100,
                                        currency: 'INR',
                                        name: "Peoples Planet",
                                        description: "Environmental Conservation Donation",
                                        image: "https://static.wixstatic.com/media/5d820f_cc9780bcdd4a44d7bfffa0c5c09d639af000.jpg",
                                        prefill: {
                                            name:    name,
                                            email:   email,
                                            contact: phone.replace(/\s+/g, '')
                                        },
                                        notes: {
                                            wants_80g: document.getElementById('pp-80g').checked ? 'Yes' : 'No'
                                        },
                                        theme: { color: '#2e7d32' },
                                        handler: function(response) {
                                            document.getElementById('pp-donate-btn').style.display = 'none';
                                            var box = document.querySelector('.elementor-shortcode > div');
                                            box.innerHTML = '<div style="text-align:center;padding:40px 20px;">'
                                                + '<div style="font-size:3em;">🌱</div>'
                                                + '<h2 style="color:#2e7d32;margin:16px 0 8px;">Thank You, ' + name + '!</h2>'
                                                + '<p style="color:#444;">Your donation of <strong>₹' + ppAmount.toLocaleString('en-IN') + '</strong> has been received.</p>'
                                                + '<p style="color:#666;font-size:0.9em;">Payment ID: ' + response.razorpay_payment_id + '</p>'
                                                + '<p style="color:#555;margin-top:16px;">Together we are making the planet greener. 🌍</p>'
                                                + '</div>';
                                        },
                                        modal: { ondismiss: function(){} }
                                    };

                                    var rzp = new Razorpay(options);
                                    rzp.on('payment.failed', function(r){
                                        ppShowError('Payment failed: ' + r.error.description);
                                    });
                                    rzp.open();
                                }
                            </script>

                        </div>
                    </div>
                </div>
                <!-- ── END DONATION FORM ── -->
    

</div>

</div>
